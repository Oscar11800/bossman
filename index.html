<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bossman</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- 3D scene fills the background -->
    <div id="scene-container"></div>

    <!-- UI overlay on top of 3D -->
    <div id="ui-overlay">
      <!-- Instructions -->
      <div id="instructions">
        <strong>Hold SPACE</strong> to tell a computer to tell a computer to tell a computer what to make.<br>
        <span class="example">Ex. "Build me a city with tiny houses and streetlights"</span>
      </div>

      <!-- Director speech bubbles -->
      <div id="director-bubbles"></div>

      <!-- Code monitor overlay (bottom right) -->
      <div id="monitor-overlay">
        <div id="monitor-header">CODER OUTPUT</div>
        <div id="monitor-content"></div>
      </div>

      <!-- Voice controls: bottom -->
      <div id="voice-bar">
        <div id="user-bubble" class="hidden"></div>
        <div id="mic-btn">
          <span class="mic-label">Hold SPACE to speak</span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
